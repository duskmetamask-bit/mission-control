<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control — AI Income Opportunities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-hover: #1a1a25;
      --border: #1e1e2e;
      --text: #e2e2e8;
      --text-dim: #6b6b80;
      --amber: #f59e0b;
      --amber-dim: #b45309;
      --amber-bg: rgba(245, 158, 11, 0.1);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --pink: #ec4899;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--amber);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span {
      color: var(--amber);
    }

    .header-meta {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--amber);
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* CONTROLS */
    .controls {
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.15s;
    }

    .tab:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tab.active {
      background: var(--amber-bg);
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      margin-left: auto;
    }

    .search-box input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--amber-dim);
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 0 32px 40px;
    }

    /* CARDS */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      border-color: var(--amber-dim);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-api { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-framework { background: rgba(168,85,247,0.15); color: var(--purple); }
    .badge-automation { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-integration { background: rgba(236,72,153,0.15); color: var(--pink); }
    .badge-monetization { background: rgba(245,158,11,0.15); color: var(--amber); }

    .card-description {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .card-leverage {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    .leverage-label {
      font-size: 10px;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .relevance {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .relevance-bar {
      width: 60px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .relevance-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--amber);
    }

    .source-link {
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-link:hover {
      color: var(--amber);
    }

    .date-found {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* TAGS */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty p {
      font-size: 14px;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--text-dim);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      header, .stats-bar, .controls, .grid {
        padding-left: 16px;
        padding-right: 16px;
      }

      .header-meta { display: none; }
      .search-box { margin-left: 0; width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1><span>MISSION</span> CONTROL</h1>
  </div>
  <div class="header-meta" id="lastUpdated"></div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat">
    <div class="stat-label">Total Opportunities</div>
    <div class="stat-value" id="totalCount">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">High Relevance (4+)</div>
    <div class="stat-value" id="highCount">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">This Week</div>
    <div class="stat-value" id="weekCount">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Top Category</div>
    <div class="stat-value" id="topCategory" style="font-size: 18px;">—</div>
  </div>
</div>

<div class="controls">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="api">APIs</button>
    <button class="tab" data-filter="framework">Frameworks</button>
    <button class="tab" data-filter="automation">Automation</button>
    <button class="tab" data-filter="integration">Integrations</button>
    <button class="tab" data-filter="monetization">Monetization</button>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search capabilities...">
  </div>
</div>

<div class="grid" id="grid">
  <div class="loading">Loading opportunities...</div>
</div>

<script>
const CATEGORY_LABELS = {
  api: 'APIs',
  framework: 'Frameworks',
  automation: 'Automation',
  integration: 'Integrations',
  monetization: 'Monetization'
};

let allOpportunities = [];
let activeFilter = 'all';
let searchQuery = '';

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isThisWeek(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  return d >= weekAgo;
}

function renderStats(data) {
  const opps = data.opportunities || [];
  const total = opps.length;
  const high = opps.filter(o => o.relevance >= 4).length;
  const week = opps.filter(o => isThisWeek(o.dateFound)).length;

  // Top category
  const catCounts = {};
  opps.forEach(o => { catCounts[o.category] = (catCounts[o.category] || 0) + 1; });
  const topCat = Object.entries(catCounts).sort((a, b) => b[1] - a[1])[0];

  document.getElementById('totalCount').textContent = total;
  document.getElementById('highCount').textContent = high;
  document.getElementById('weekCount').textContent = week;
  document.getElementById('topCategory').textContent = topCat ? CATEGORY_LABELS[topCat[0]] : '—';

  // Last updated
  if (data.lastUpdated) {
    document.getElementById('lastUpdated').textContent = 'Updated: ' + formatDate(data.lastUpdated);
  }
}

function renderCards(opportunities) {
  const grid = document.getElementById('grid');

  if (opportunities.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>No opportunities found</h3>
        <p>Try a different search or filter</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = opportunities.map(opp => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${opp.name}</div>
        <span class="badge badge-${opp.category}">${CATEGORY_LABELS[opp.category] || opp.category}</span>
      </div>
      <div class="card-description">${opp.description}</div>
      <div class="card-leverage">
        <div class="leverage-label">💡 How to leverage</div>
        ${opp.leverage}
      </div>
      <div class="tags">
        ${(opp.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="card-footer">
        <div class="relevance">
          Relevance: ${opp.relevance}/5
          <div class="relevance-bar">
            <div class="relevance-fill" style="width: ${opp.relevance * 20}%"></div>
          </div>
        </div>
        <a href="${opp.source}" target="_blank" class="source-link">
          ↗ ${opp.sourceName}
        </a>
      </div>
      <div class="date-found">Found: ${formatDate(opp.dateFound)}</div>
    </div>
  `).join('');
}

function filterAndRender() {
  let filtered = allOpportunities;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(o => o.category === activeFilter);
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(o =>
      o.name.toLowerCase().includes(q) ||
      o.description.toLowerCase().includes(q) ||
      o.leverage.toLowerCase().includes(q) ||
      (o.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  renderCards(filtered);
}

async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Failed to load data');
    const data = await res.json();
    allOpportunities = data.opportunities || [];
    renderStats(data);
    renderCards(allOpportunities);
  } catch (e) {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠</div>
        <h3>Could not load data</h3>
        <p>${e.message}</p>
      </div>
    `;
  }
}

// Filter tabs
document.getElementById('filterTabs').addEventListener('click', e => {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    filterAndRender();
  }
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  filterAndRender();
});

init();
</script>
</body>
</html>
